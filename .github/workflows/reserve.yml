run-name: >-
  Reserve -
  ${{ github.event.client_payload.trigger_date || github.event.client_payload.school_id || github.event.client_payload.remark || github.event.client_payload.username || 'manual' }}

on:
  repository_dispatch:
    types: [reserve]
  workflow_dispatch:        # 允许手动开/关

jobs:
  prepare-dispatch:
    if: ${{ github.event_name == 'repository_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      users_matrix: ${{ steps.build.outputs.users_matrix }}
    steps:
      - name: Build user matrix from payload
        id: build
        run: |
          users=$(jq -c '.client_payload.users // [ .client_payload ]' "$GITHUB_EVENT_PATH")
          echo "users_matrix=$users" >> "$GITHUB_OUTPUT"

  reserve-dispatch:
    name: reserve-dispatch (${{ matrix.user.remark || matrix.user.username || '用户' }})
    if: ${{ github.event_name == 'repository_dispatch' }}
    needs: prepare-dispatch
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        user: ${{ fromJson(needs.prepare-dispatch.outputs.users_matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run reserve script
        env:
          CX_USERNAME: ${{ secrets.CX_USERNAME }}
          CX_PASSWORD: ${{ secrets.CX_PASSWORD }}
          DISPATCH_PAYLOAD: ${{ toJson(matrix.user) }}
          TULINGCLOUD_USERNAME: ${{ secrets.TULINGCLOUD_USERNAME }}
          TULINGCLOUD_PASSWORD: ${{ secrets.TULINGCLOUD_PASSWORD }}
          TULINGCLOUD_MODEL_ID: ${{ secrets.TULINGCLOUD_MODEL_ID }}
        run: |
          python main.py --action --dispatch 2>&1 | tee reserve.log

      - name: Extract key logs
        if: ${{ always() }}
        env:
          USER_NAME: ${{ matrix.user.remark || matrix.user.username || 'user' }}
        run: |
          user_name="${USER_NAME}"
          {
            echo "### 用户关键日志 - ${user_name}"
            echo
            echo "筛选规则：登录、token 获取、验证码、策略发射/结果、提交参数、保存失败、座位递增、dispatch/异常、结束状态"
            echo
            echo '```text'
            if [[ -f reserve.log ]]; then
              grep -E "Start first attempt|login successfully|\[strategic\]|\[burst\]|submit parameter|submit enc|Get token|Got token|token fetch failed|No submit_enc|captcha|Slider captcha token|Textclick captcha token|保存失败|seat-increment|dispatch|HTTP [0-9]{3}|exception|error|Current time|reserved successfully|success list" reserve.log | tail -n 260 || true
            else
              echo "reserve.log not found"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  reserve-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run reserve script (manual)
        env:
          CX_USERNAME: ${{ secrets.CX_USERNAME }}
          CX_PASSWORD: ${{ secrets.CX_PASSWORD }}
          TULINGCLOUD_USERNAME: ${{ secrets.TULINGCLOUD_USERNAME }}
          TULINGCLOUD_PASSWORD: ${{ secrets.TULINGCLOUD_PASSWORD }}
          TULINGCLOUD_MODEL_ID: ${{ secrets.TULINGCLOUD_MODEL_ID }}
        run: |
          python main.py --action 2>&1 | tee reserve.log

      - name: Extract key logs (manual)
        if: ${{ always() }}
        env:
          USER_NAME: manual
        run: |
          user_name="${USER_NAME}"
          {
            echo "### 用户关键日志 - ${user_name}"
            echo
            echo "筛选规则：登录、token 获取、验证码、策略发射/结果、提交参数、保存失败、座位递增、dispatch/异常、结束状态"
            echo
            echo '```text'
            if [[ -f reserve.log ]]; then
              grep -E "Start first attempt|login successfully|\[strategic\]|\[burst\]|submit parameter|submit enc|Get token|Got token|token fetch failed|No submit_enc|captcha|Slider captcha token|Textclick captcha token|保存失败|seat-increment|dispatch|HTTP [0-9]{3}|exception|error|Current time|reserved successfully|success list" reserve.log | tail -n 260 || true
            else
              echo "reserve.log not found"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"


