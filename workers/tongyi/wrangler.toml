# ====================================================
# Cloudflare Worker — 抢座管理中枢
# ====================================================
# 部署前需要:
# 1. 创建 KV namespace:  wrangler kv:namespace create "SEAT_KV"
#    然后把返回的 id 填入下方 [[kv_namespaces]]
# 2. 设置 Secrets:
#    wrangler secret put GH_TOKEN      # GitHub PAT (repo scope)
#    wrangler secret put GH_TOKEN_A    # GitHub PAT A (repo scope)
#    wrangler secret put GH_TOKEN_B    # GitHub PAT B (repo scope)
#    wrangler secret put GH_TOKEN_C    # GitHub PAT C (repo scope)
#    wrangler secret put GH_TOKEN_D    # GitHub PAT D (repo scope)
#    wrangler secret put GH_TOKEN_E    # GitHub PAT E (repo scope)
#    wrangler secret put API_KEY        # 管理面板登录密钥

name = "tongyi"
account_id = "288006df1270dacb1b639eb6b60ad881"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[triggers]
# 北京时间常规分钟窗口 05:53-21:56，额外补充 21:23-21:26；Cloudflare cron 使用 UTC
crons = ["53-56 21-23 * * *", "53-56 0-13 * * *", "23-26 13 * * *"]

[[kv_namespaces]]
binding = "SEAT_KV"
id = "855ed3d52d7b47c9bbf76681d69de5b5"
